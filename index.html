<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊足跡</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-body: #ffffff;
            --container-bg: #f8f9fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --accent: #007bff;
            --map-base: #e0e0e0; 
            --map-bg: #aad3df; 
            
            --color-asia: #ff7675;    --color-europe: #74b9ff;  --color-africa: #55efc4;
            --color-northam: #ffe66d; --color-southam: #a29bfe; --color-oceania: #81ecec;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-body); color: var(--text-main); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; overflow: hidden; }
        
        #app { display: flex; flex-direction: column; height: 100vh; }

        #map { 
            flex: 2; 
            width: 100%; 
            background-color: var(--map-bg); 
        }

        #dashboard { 
            flex: 1; 
            background: var(--container-bg); 
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 12px 15px;
            box-sizing: border-box;
            min-height: 220px;
            z-index: 1000; 
        }

        .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .toolbar h2 { margin: 0; font-size: 1rem; color: var(--accent); white-space: nowrap; letter-spacing: 1px; }
        
        .action-btn { padding: 5px 12px; cursor: pointer; border-radius: 18px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 0.75rem; font-weight: bold; white-space: nowrap; transition: 0.2s; }
        .action-btn:hover { background: var(--accent); color: white; }
        
        .search-box { flex: 1; min-width: 120px; background: var(--bg-body); border: 1px solid var(--border-color); padding: 8px 15px; color: var(--text-main); border-radius: 20px; outline: none; font-size: 0.85rem; }

        #country-list-wrapper { flex: 1; overflow-y: auto; padding-bottom: 10px; }

        #country-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); 
            gap: 10px; 
            list-style: none; 
            margin: 0; 
            padding: 5px 2px; 
        }

        #country-list li { 
            background: var(--bg-body); 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            position: relative; 
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06); 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }

        .en-name { font-weight: bold; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 18px; }
        .zh-display { font-size: 0.75rem; color: var(--accent); margin-top: 4px; }
        .zh-edit { width: 100%; font-size: 0.75rem; border: none; border-bottom: 1px solid var(--accent); background: transparent; color: var(--accent); outline: none; }
        
        .del-btn { position: absolute; right: 8px; top: 8px; color: #ff4d4d; opacity: 0.4; font-size: 1rem; width: 20px; height: 20px; text-align: center; line-height: 20px; }

        footer { text-align: center; font-size: 0.65rem; color: var(--text-muted); padding: 8px 0; border-top: 1px solid var(--border-color); font-weight: bold; }

        @media (max-width: 480px) {
            #country-list { grid-template-columns: repeat(2, 1fr); }
            #dashboard { flex: 1.5; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="map"></div>
    <div id="dashboard">
        <div class="toolbar">
            <h2>🌍 旅遊足跡</h2>
            <button class="action-btn" onclick="importFromCode()">匯入</button>
            <button class="action-btn" onclick="exportToCode()">備份</button>
            <input type="text" class="search-box" id="search-input" placeholder="搜尋國家或備註...">
            <div style="font-size: 0.8rem;">已造訪: <span id="count" style="font-weight:bold; color:var(--accent);">0</span></div>
        </div>
        <div id="country-list-wrapper">
            <ul id="country-list"></ul>
        </div>
        <footer>©Titleman Cloud</footer>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const continentMap = {
        "Taiwan": "AS", "Japan": "AS", "South Korea": "AS", "China": "AS", "Thailand": "AS", "Vietnam": "AS", "Philippines": "AS",
        "United Kingdom": "EU", "France": "EU", "Germany": "EU", "Italy": "EU", "Spain": "EU",
        "United States of America": "NA", "Canada": "NA", "Mexico": "NA", "Australia": "OC"
    };

    const continentColors = { 
        "AS": "var(--color-asia)", "EU": "var(--color-europe)", "AF": "var(--color-africa)",
        "NA": "var(--color-northam)", "SA": "var(--color-southam)", "OC": "var(--color-oceania)"
    };

    const specialRegions = [
        { name: "Hong Kong", lat: 22.3193, lng: 114.1694, continent: "AS" },
        { name: "Subic Bay", lat: 14.8216, lng: 120.2711, continent: "AS" },
        { name: "Macao", lat: 22.1987, lng: 113.5439, continent: "AS" },
        { name: "Guam", lat: 13.4443, lng: 144.7937, continent: "OC" },
        { name: "Singapore", lat: 1.3521, lng: 103.8198, continent: "AS" }
    ];

    let visitedCountries = JSON.parse(localStorage.getItem('visitedCountries')) || [];
    let customNotes = JSON.parse(localStorage.getItem('customNotes')) || {}; 
    let geojsonLayer, layersMap = {};

    // 【修改點】setView 設定為 [25, 10]，縮放層級設為 1.5，讓世界地圖初始時較為居中
    const map = L.map('map', { 
        zoomSnap: 0.1, 
        minZoom: 1.2, 
        worldCopyJump: false,
        maxBounds: [[-85, -Infinity], [85, Infinity]], 
        maxBoundsViscosity: 1.0,
        attributionControl: false 
    }).setView([25, 10], 1.5); 

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { 
        noWrap: true,
        bounds: [[-90, -180], [90, 180]],
        opacity: 0.2 
    }).addTo(map);

    window.addEventListener('resize', () => {
        setTimeout(() => map.invalidateSize(), 400);
    });

    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
        .then(res => res.json())
        .then(data => {
            geojsonLayer = L.geoJson(data, { style: getStyle, onEachFeature: onEachFeature }).addTo(map);
            initSpecialRegions();
            updateUI();
        });

    function initSpecialRegions() {
        specialRegions.forEach(region => {
            const isVisited = visitedCountries.includes(region.name);
            const marker = L.circleMarker([region.lat, region.lng], {
                radius: 7, fillColor: isVisited ? (continentColors[region.continent] || "#f39c12") : "var(--map-base)",
                color: 'var(--border-color)', weight: 1.5, fillOpacity: isVisited ? 0.9 : 0.6
            }).addTo(map);
            layersMap[region.name] = marker;
            marker.on('click', (e) => { L.DomEvent.stopPropagation(e); toggleCountry(region.name); });
            marker.on('mouseover', () => {
                const note = customNotes[region.name];
                marker.bindTooltip(note ? `${region.name} (${note})` : region.name, { sticky: true }).openTooltip();
            });
        });
    }

    function getStyle(feature) {
        const name = feature ? feature.properties.name : this.name;
        const isVisited = visitedCountries.includes(name);
        const continent = continentMap[name] || null;
        return {
            fillColor: isVisited ? (continentColors[continent] || "#f39c12") : "var(--map-base)",
            weight: 1, color: 'var(--border-color)', fillOpacity: isVisited ? 0.9 : 0.6
        };
    }

    function updateMapStyles() {
        if(geojsonLayer) geojsonLayer.setStyle(getStyle);
        specialRegions.forEach(region => {
            const marker = layersMap[region.name];
            if(marker) {
                const isVisited = visitedCountries.includes(region.name);
                marker.setStyle({ fillColor: isVisited ? (continentColors[region.continent] || "#f39c12") : "var(--map-base)", fillOpacity: isVisited ? 0.9 : 0.6 });
            }
        });
    }

    function onEachFeature(feature, layer) {
        const name = feature.properties.name;
        layersMap[name] = layer;
        layer.on('click', (e) => { L.DomEvent.stopPropagation(e); toggleCountry(name); });
        layer.on('mouseover', () => {
            const note = customNotes[name];
            layer.bindTooltip(note ? `${name} (${note})` : name, { sticky: true }).openTooltip();
        });
    }

    function toggleCountry(name) {
        const idx = visitedCountries.indexOf(name);
        idx > -1 ? visitedCountries.splice(idx, 1) : visitedCountries.push(name);
        localStorage.setItem('visitedCountries', JSON.stringify(visitedCountries));
        updateMapStyles();
        updateUI();
    }

    function updateUI() {
        const listEl = document.getElementById('country-list');
        document.getElementById('count').innerText = visitedCountries.length;
        listEl.innerHTML = '';
        visitedCountries.sort().forEach(name => {
            const li = document.createElement('li');
            const note = customNotes[name] || "";
            li.innerHTML = `
                <span class="en-name">${name}</span>
                <div class="zh-display" onclick="event.stopPropagation(); startEdit(this, '${name}')">${note || '✎ 備註'}</div>
                <span class="del-btn" onclick="event.stopPropagation(); toggleCountry('${name}')">✕</span>
            `;
            li.onclick = () => {
                const layer = layersMap[name];
                if (layer.getBounds) map.flyToBounds(layer.getBounds(), { padding: [40, 40] });
                else if (layer.getLatLng) map.setView(layer.getLatLng(), 8);
            };
            listEl.appendChild(li);
        });
    }

    function startEdit(displayElement, countryName) {
        const input = document.createElement('input');
        input.className = 'zh-edit';
        input.value = displayElement.innerText === '✎ 備註' ? '' : displayElement.innerText;
        input.onblur = function() {
            const val = this.value.trim();
            val ? customNotes[countryName] = val : delete customNotes[countryName];
            localStorage.setItem('customNotes', JSON.stringify(customNotes));
            updateUI();
        };
        input.onkeydown = e => { if(e.key === 'Enter') input.blur(); };
        displayElement.replaceWith(input);
        input.focus();
    }

    document.getElementById('search-input').addEventListener('input', e => {
        const val = e.target.value.toLowerCase().trim();
        if(!val) return;
        for (let name in layersMap) {
            if (name.toLowerCase().includes(val) || (customNotes[name] || "").toLowerCase().includes(val)) {
                const layer = layersMap[name];
                layer.getBounds ? map.flyToBounds(layer.getBounds()) : map.setView(layer.getLatLng(), 6);
                break;
            }
        }
    });

    function exportToCode() {
        const code = btoa(unescape(encodeURIComponent(JSON.stringify({ visitedCountries, customNotes }))));
        navigator.clipboard.writeText(code).then(() => alert('✅ 備份代碼已複製！')).catch(() => prompt('複製失敗，代碼如下：', code));
    }

    function importFromCode() {
        const code = prompt('請貼上備份代碼：');
        if (!code) return;
        try {
            const data = JSON.parse(decodeURIComponent(escape(atob(code))));
            visitedCountries = data.visitedCountries || [];
            customNotes = data.customNotes || {};
            localStorage.setItem('visitedCountries', JSON.stringify(visitedCountries));
            localStorage.setItem('customNotes', JSON.stringify(customNotes));
            updateMapStyles(); updateUI();
            alert('✅ 匯入成功！');
        } catch (e) { alert('❌ 代碼無效！'); }
    }
</script>
</body>
</html>
